name: Plan et Deploiement Terraform

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Permet le declenchement manuel

env:
  TF_VERSION: '1.7.5'
  WORKING_DIR: 'environnements/prod'
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration des credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Installation Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -lock=false \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" \
            -out=tfplan
        working-directory: ${{ env.WORKING_DIR }}

      - name: Affichage du plan dans le PR
        run: terraform show tfplan
        working-directory: ${{ env.WORKING_DIR }}

      - name: Sauvegarde du plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 1

  terraform-apply:
    name: Terraform Apply (APPROBATION MANUELLE REQUISE)
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration des credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Installation Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}

      - name: Recuperation du plan approuve
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.WORKING_DIR }}
          merge-multiple: true

      - name: Terraform Apply
        run: terraform apply -auto-approve -lock=false tfplan
        working-directory: ${{ env.WORKING_DIR }}

      - name: Affichage des outputs
        run: terraform output
        working-directory: ${{ env.WORKING_DIR }}
